<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablero IMSS Bienestar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>
  <main class="layout">

      <p class="eyebrow">Panel de Seguimiento</p>
      <h1>Tablero de Avance</h1>

    <section id="panel-graficas" class="panel active"></section>
    <section id="tables-root"></section>
  </main>

  <footer class="footer">
    <img src="https://imssbienestar.gob.mx/assets/img/imb_b.svg" alt="Logo IMSS Bienestar" class="logo" />
  </footer>

  <script src="data.js"></script>

</html>
